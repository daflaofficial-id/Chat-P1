<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <title>AnonMesh Chat</title>
  <link rel="icon" href="logo.png">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-hover: #263348;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #ffffff;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --glass-bg: rgba(30,41,59,0.75);
      --glass-border: rgba(255,255,255,0.08);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
      --radius: 16px;
      --radius-sm: 10px;
      --nav-height: 68px;
      --transition: 0.25s;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; max-width: 480px; margin:0 auto;
      display:flex; flex-direction:column;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }
    .screen { display:none; flex-direction:column; flex:1; height:100dvh; }
    .screen.active { display:flex; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .splash-screen {
      display:flex; align-items:center; justify-content:center;
      background:var(--bg); position:fixed; inset:0; z-index:1000;
    }
    .splash-logo { width:100px; height:100px; margin:0 auto 20px; }
    .splash-logo img { width:100%; height:100%; border-radius:22px; }
    .splash-title { font-size:26px; font-weight:700; }
    .splash-loader { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:20px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .login-card {
      background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border);
      border-radius:24px; padding:32px 24px; width:90%; max-width:380px; box-shadow:var(--shadow); text-align:center;
    }
    .input-group { margin:18px 0; }
    .input-group input {
      width:100%; padding:14px; background:var(--card); border:2px solid var(--border);
      border-radius:var(--radius); color:var(--text); font-size:15px; outline:none;
    }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding:13px 24px; border-radius:var(--radius); font-size:15px; font-weight:600;
      border:none; cursor:pointer; transition:var(--transition);
    }
    .btn-primary { background:var(--primary); color:#fff; width:100%; }
    .btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
    .btn-sm { padding:8px 16px; font-size:13px; }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-success { background:var(--success); color:#fff; }

    .perm-card {
      background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border);
      border-radius:24px; padding:28px 20px; width:90%; max-width:380px; box-shadow:var(--shadow);
    }
    .perm-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--card); border-radius:var(--radius); margin:8px 0; }
    .status-dot { width:10px; height:10px; border-radius:50%; }
    .dot-ok { background:var(--success); }
    .dot-no { background:var(--danger); animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

    .app-header {
      display:flex; align-items:center; padding:10px 16px; gap:12px;
      background:var(--glass-bg); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border);
      position:sticky; top:0; z-index:50;
    }
    .back-btn { width:36px; height:36px; border-radius:50%; background:var(--card); border:none; color:var(--text); font-size:20px; cursor:pointer; }
    .header-info { flex:1; }
    .header-title { font-weight:700; }
    .header-status { font-size:12px; color:var(--success); }
    .header-status.offline { color:var(--text-muted); }
    .icon-btn { width:42px; height:42px; border-radius:50%; background:var(--card); border:none; color:var(--text); font-size:20px; cursor:pointer; }

    .bottom-nav {
      display:flex; justify-content:space-around; background:var(--glass-bg); backdrop-filter:blur(20px);
      border-top:1px solid var(--glass-border); padding:6px 8px; position:fixed; bottom:0; left:50%;
      transform:translateX(-50%); width:100%; max-width:480px; z-index:200; height:var(--nav-height);
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
      padding:8px 12px; border-radius:var(--radius); font-size:10px; font-weight:500;
      color:var(--text-muted); background:transparent; border:none;
    }
    .nav-item.active { color:var(--primary); font-weight:700; }

    .chat-list-item {
      display:flex; align-items:center; gap:12px; padding:14px 16px;
      background:var(--card); border-radius:var(--radius); cursor:pointer; margin-bottom:8px;
    }
    .avatar {
      width:48px; height:48px; border-radius:50%; background:var(--primary);
      display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; position:relative;
    }
    .online-dot { position:absolute; bottom:2px; right:2px; width:12px; height:12px; background:var(--success); border:2px solid var(--card); border-radius:50%; }
    .chat-info { flex:1; }
    .chat-name { font-weight:600; }
    .chat-preview { font-size:12px; color:var(--text-secondary); }
    .chat-time { font-size:11px; color:var(--text-muted); }
    .search-input {
      width:100%; padding:12px; background:var(--card); border:2px solid var(--border);
      border-radius:var(--radius); color:var(--text); font-size:14px; margin-bottom:12px;
    }

    .messages-container { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px; }
    .message-bubble { max-width:80%; padding:10px 14px; border-radius:18px; font-size:14px; }
    .message-sent { align-self:flex-end; background:var(--primary); color:#fff; }
    .message-received { align-self:flex-start; background:var(--card); color:var(--text); }
    .chat-input-area {
      display:flex; gap:8px; padding:10px; background:var(--glass-bg); backdrop-filter:blur(20px);
      border-top:1px solid var(--glass-border);
    }
    .chat-input-area input { flex:1; padding:12px; background:var(--card); border:2px solid var(--border); border-radius:24px; color:var(--text); }
    .send-btn { background:var(--primary); color:#fff; }
    .recording { background:var(--danger); animation:pulse 0.8s infinite; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500;
      display:flex; align-items:flex-end; justify-content:center; max-width:480px; margin:0 auto;
    }
    .modal-overlay.hidden { display:none; }
    .modal-sheet { background:var(--card); border-radius:24px 24px 0 0; padding:20px; width:100%; max-height:70vh; overflow-y:auto; }
    .modal-option { padding:14px; cursor:pointer; border-radius:var(--radius); }

    .settings-item {
      display:flex; align-items:center; justify-content:space-between; padding:14px;
      background:var(--card); border-radius:var(--radius); margin-bottom:6px; cursor:pointer;
    }
    .toggle-switch { width:48px; height:28px; background:var(--border); border-radius:14px; position:relative; }
    .toggle-switch.on { background:var(--primary); }
    .toggle-switch::after { content:''; position:absolute; width:22px; height:22px; background:#fff; border-radius:50%; top:3px; left:3px; transition:0.2s; }
    .toggle-switch.on::after { left:23px; }

    .toast {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--card);
      color:var(--text); padding:12px 20px; border-radius:24px; font-size:13px; z-index:999;
    }
    .radar-item { display:flex; align-items:center; gap:12px; padding:14px; background:var(--card); border-radius:var(--radius); margin-bottom:8px; cursor:pointer; }
    .bluetooth-status {
      position:fixed; top:10px; right:10px; background:var(--success); color:#fff;
      padding:6px 12px; border-radius:16px; font-size:12px; z-index:300;
    }
    .bluetooth-status.off { background:var(--danger); }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-logo"><img src="logo.png" alt="Logo" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=font-size:60px;>💬</div>';"></div>
    <div class="splash-title">AnonMesh Chat</div>
    <div style="color:var(--text-secondary);">Bluetooth Mesh · E2E Encryption</div>
    <div class="splash-loader"></div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div style="display:flex;align-items:center;justify-content:center;flex:1;padding:20px;">
      <div class="login-card">
        <div style="font-size:48px;">🔐</div>
        <h2>Masuk AnonMesh</h2>
        <div class="input-group"><input type="text" id="username-input" placeholder="Nama Pengguna" maxlength="25"></div>
        <button class="btn btn-primary" id="btn-login">🚀 Masuk</button>
      </div>
    </div>
  </div>

  <!-- Permission Screen -->
  <div id="permission-screen" class="screen">
    <div style="display:flex;align-items:center;justify-content:center;flex:1;padding:20px;">
      <div class="perm-card">
        <h3>🔒 Izin Diperlukan</h3>
        <div class="perm-item"><span class="status-dot" id="dot-bluetooth"></span>📶 Bluetooth <span id="status-bluetooth">-</span></div>
        <div class="perm-item"><span class="status-dot" id="dot-mic"></span>🎤 Mikrofon <span id="status-mic">-</span></div>
        <div class="perm-item"><span class="status-dot" id="dot-cam"></span>📷 Kamera <span id="status-cam">-</span></div>
        <button class="btn btn-primary" id="btn-check-perms">🔍 Periksa & Aktifkan</button>
        <button class="btn btn-outline" id="btn-skip-perms" style="width:100%;margin-top:8px;">Lanjutkan (Mode Terbatas)</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-screen" class="screen">
    <div class="bluetooth-status" id="bluetooth-indicator">📶 BT</div>
    <div id="tab-chat" class="tab-content" style="flex:1;display:flex;flex-direction:column;padding:12px;">
      <input class="search-input" id="search-chat" placeholder="🔍 Cari chat...">
      <div id="chat-list-container" style="flex:1;overflow-y:auto;"></div>
    </div>
    <div id="tab-friends" class="tab-content" style="flex:1;display:none;flex-direction:column;padding:12px;">
      <button class="btn btn-outline" id="btn-add-friend" style="margin-bottom:12px;">➕ Tambah Teman</button>
      <div id="friends-list-container" style="flex:1;overflow-y:auto;"></div>
    </div>
    <div id="tab-radar" class="tab-content" style="flex:1;display:none;flex-direction:column;padding:12px;">
      <h3>📡 Radar Bluetooth</h3>
      <button class="btn btn-primary" id="btn-scan-ble" style="margin:12px 0;">🔍 Pindai Perangkat Sekitar</button>
      <div id="radar-container" style="flex:1;overflow-y:auto;"></div>
    </div>
    <div id="tab-profile" class="tab-content" style="flex:1;display:none;flex-direction:column;align-items:center;padding:20px;">
      <div class="avatar" style="width:72px;height:72px;font-size:28px;" id="profile-avatar">?</div>
      <h3 id="profile-name" style="margin-top:10px;">-</h3>
      <p id="profile-id" style="font-family:monospace;word-break:break-all;text-align:center;">-</p>
      <canvas id="profile-qr" width="180" height="180" style="background:#fff;margin:12px;border-radius:12px;"></canvas>
      <button class="btn btn-sm btn-outline" id="btn-edit-profile">✏️ Edit Profil</button>
    </div>
    <div id="tab-settings" class="tab-content" style="flex:1;display:none;flex-direction:column;padding:12px;">
      <div class="settings-item" id="menu-profile"><span>👤 Profil Saya</span><span>→</span></div>
      <div class="settings-item" id="menu-privacy"><span>🔒 Privasi</span><span>→</span></div>
      <div class="settings-item" id="menu-blocked"><span>🚫 Daftar Blokir</span><span>→</span></div>
      <div class="settings-item" id="menu-starred"><span>⭐ Pesan Berbintang</span><span>→</span></div>
      <div class="settings-item" id="menu-theme"><span>🎨 Tema</span><span id="theme-label">Dark</span></div>
      <div class="settings-item" id="menu-about"><span>ℹ️ Tentang</span><span>→</span></div>
    </div>
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="chat">💬 Chat</button>
      <button class="nav-item" data-tab="friends">👥 Teman</button>
      <button class="nav-item" data-tab="radar">📡 Radar</button>
      <button class="nav-item" data-tab="profile">👤 Profil</button>
      <button class="nav-item" data-tab="settings">⚙️</button>
    </nav>
  </div>

  <!-- Chat Detail Screen -->
  <div id="chat-detail-screen" class="screen">
    <div class="app-header">
      <button class="back-btn" id="btn-back-chat">←</button>
      <div class="header-info">
        <div class="header-title" id="chat-partner-name">-</div>
        <div class="header-status" id="chat-partner-status">offline</div>
      </div>
      <button class="icon-btn" id="btn-chat-menu">⋮</button>
    </div>
    <div id="pinned-container"></div>
    <div class="messages-container" id="messages-container"></div>
    <div class="chat-input-area">
      <button class="icon-btn" id="btn-voice">🎤</button>
      <input type="text" id="message-input" placeholder="Ketik pesan...">
      <button class="icon-btn send-btn" id="btn-send">➤</button>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-sheet" id="modal-content"></div>
  </div>
  <div class="toast" id="toast" style="display:none;"></div>

  <script>
    (function() {
      const PREFIX = 'anonmesh_';
      let currentUser = null;
      let allChats = {};
      let friendsList = [];
      let blockedUsers = [];
      let starredMessages = [];
      let settings = { privacy: { allowAddViaID:true, allowAddViaQR:true, showMyQR:true, acceptVoice:true }, theme:'dark' };
      let permissions = { bluetooth:false, mic:false, camera:false };
      let currentPartnerId = null;
      let isRecording = false;
      let mediaRecorder = null;
      let recStart = 0;
      let connectedDevices = {}; // Map deviceId -> { device, characteristic }
      const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
      const CHAR_UUID = 'abcd1234-1234-1234-1234-123456789abc';

      // ==================== STORAGE ====================
      function save() { localStorage.setItem(PREFIX+'data', JSON.stringify({currentUser, allChats, friendsList, blockedUsers, starredMessages, settings, permissions})); }
      function load() {
        const raw = localStorage.getItem(PREFIX+'data');
        if(raw) {
          try {
            const d = JSON.parse(raw);
            currentUser = d.currentUser; allChats = d.allChats||{}; friendsList = d.friendsList||[];
            blockedUsers = d.blockedUsers||[]; starredMessages = d.starredMessages||[];
            settings = d.settings||{ privacy:{allowAddViaID:true,allowAddViaQR:true,showMyQR:true,acceptVoice:true}, theme:'dark' };
            permissions = d.permissions||{ bluetooth:false, mic:false, camera:false };
          } catch(e){ resetData(); }
        } else resetData();
      }
      function resetData() {
        currentUser=null; allChats={}; friendsList=[]; blockedUsers=[]; starredMessages=[];
        settings={ privacy:{allowAddViaID:true,allowAddViaQR:true,showMyQR:true,acceptVoice:true}, theme:'dark' };
        permissions={ bluetooth:false, mic:false, camera:false };
      }
      const CHARSET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()-_=+[]{}|;:,.<>?/';
      function genId() { let id=''; for(let i=0;i<23;i++) id+=CHARSET[Math.floor(Math.random()*CHARSET.length)]; return id; }
      const formatTime = (iso) => {
        const d=new Date(iso), now=new Date();
        const h=d.getHours().toString().padStart(2,'0'), m=d.getMinutes().toString().padStart(2,'0');
        if(d.toDateString()===now.toDateString()) return `Hari ini ${h}:${m}`;
        const y=new Date(now); y.setDate(now.getDate()-1);
        if(d.toDateString()===y.toDateString()) return `Kemarin ${h}:${m}`;
        return `${d.getDate()}/${d.getMonth()+1} ${h}:${m}`;
      };
      const toast = (msg) => {
        const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
        clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2000);
      };
      const showModal = (html) => { document.getElementById('modal-content').innerHTML=html; document.getElementById('modal-overlay').classList.remove('hidden'); };
      const hideModal = () => document.getElementById('modal-overlay').classList.add('hidden');
      const applyTheme = () => {
        document.body.classList.toggle('light-mode', settings.theme==='light' || (settings.theme==='system' && matchMedia('(prefers-color-scheme:light)').matches));
        document.getElementById('theme-label').textContent = settings.theme==='dark'?'Dark':settings.theme==='light'?'Light':'System';
      };

      // ==================== BLUETOOTH ====================
      async function checkBluetooth() {
        if (!navigator.bluetooth) { permissions.bluetooth = false; return false; }
        try {
          const available = await navigator.bluetooth.getAvailability();
          permissions.bluetooth = available;
          return available;
        } catch { permissions.bluetooth = false; return false; }
      }
      function updateBluetoothIndicator() {
        const el = document.getElementById('bluetooth-indicator');
        if (el) {
          el.textContent = permissions.bluetooth ? '📶 BT Aktif' : '📶 BT Mati';
          el.className = 'bluetooth-status' + (permissions.bluetooth ? '' : ' off');
        }
      }

      async function connectToDevice(deviceName) {
        if (!permissions.bluetooth) { toast('Bluetooth tidak aktif!'); return null; }
        try {
          const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: deviceName }],
            optionalServices: [SERVICE_UUID]
          });
          const server = await device.gatt.connect();
          const service = await server.getPrimaryService(SERVICE_UUID);
          const characteristic = await service.getCharacteristic(CHAR_UUID);
          // Mulai notifikasi untuk menerima pesan
          await characteristic.startNotifications();
          characteristic.addEventListener('characteristicvaluechanged', (event) => {
            const value = new TextDecoder().decode(event.target.value);
            try {
              const payload = JSON.parse(value);
              handleIncomingMessage(payload);
            } catch(e) {}
          });
          // Simpan koneksi
          connectedDevices[device.id] = { device, characteristic };
          return { id: device.id, name: device.name };
        } catch(e) {
          toast('Gagal menghubungkan ke perangkat');
          return null;
        }
      }

      async function scanForDevices() {
        if (!permissions.bluetooth) {
          const ok = await checkBluetooth();
          if (!ok) { toast('Bluetooth tidak tersedia. Aktifkan Bluetooth terlebih dahulu.'); updateBluetoothIndicator(); return; }
        }
        // Karena Web Bluetooth tidak bisa silent scan, kita minta pengguna memilih perangkat
        try {
          const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [SERVICE_UUID]
          });
          const name = device.name || 'Perangkat Tanpa Nama';
          addRadarDevice(name, device.id);
          // Otomatis sambungkan
          const connected = await connectToDevice(name);
          if (connected) {
            toast('Terhubung ke ' + name);
          }
        } catch(e) {
          toast('Pemindaian dibatalkan');
        }
      }

      function addRadarDevice(name, id) {
        const container = document.getElementById('radar-container');
        if (!container) return;
        if (document.querySelector(`.radar-item[data-id="${id}"]`)) return;
        const div = document.createElement('div');
        div.className = 'radar-item';
        div.dataset.id = id;
        div.innerHTML = `<div class="avatar">${name.charAt(0).toUpperCase()}</div><div><strong>${name}</strong><br><small>${id}</small></div>`;
        div.addEventListener('click', () => {
          if (!friendsList.find(f => f.chatId === id)) {
            friendsList.push({ name, chatId: id });
            allChats[id] = { partnerName: name, messages:[], pinned:[], online: true };
            save();
          }
          openChat(id);
          switchTab('chat');
        });
        container.appendChild(div);
      }

      async function sendViaBluetooth(partnerId, payload) {
        const deviceEntry = Object.values(connectedDevices).find(d => d.device.id === partnerId);
        if (!deviceEntry) return false;
        try {
          const encoder = new TextEncoder();
          await deviceEntry.characteristic.writeValue(encoder.encode(JSON.stringify(payload)));
          return true;
        } catch(e) { return false; }
      }

      function handleIncomingMessage(payload) {
        const { sender, content, timestamp } = payload;
        if (!sender || blockedUsers.some(b => b.chatId === sender)) return;
        if (!allChats[sender]) {
          const friend = friendsList.find(f => f.chatId === sender);
          if (!friend) return;
          allChats[sender] = { partnerName: friend.name, messages:[], pinned:[], online: true };
        }
        allChats[sender].messages.push({ type:'text', content, sender:'partner', timestamp });
        allChats[sender].online = true;
        save();
        if (currentPartnerId === sender) renderMessages();
        renderChatList();
        if (permissions.notif && document.hidden) {
          new Notification('AnonMesh', { body: `${allChats[sender].partnerName}: ${content}` });
        }
      }

      // ==================== UI RENDER ====================
      function renderChatList(filter='') {
        const container = document.getElementById('chat-list-container');
        const chats = Object.values(allChats);
        const f = filter.toLowerCase();
        const filtered = f ? chats.filter(c => c.partnerName.toLowerCase().includes(f)) : chats;
        container.innerHTML = filtered.length ? filtered.map(c => {
          const last = c.messages.slice(-1)[0];
          return `<div class="chat-list-item" data-id="${c.partnerId}">
            <div class="avatar">${c.partnerName[0]}<span class="online-dot ${c.online?'':'offline-dot'}"></span></div>
            <div class="chat-info"><div class="chat-name">${c.partnerName}</div><div class="chat-preview">${last?last.content:''}</div></div>
            <div class="chat-time">${last?formatTime(last.timestamp):''}</div></div>`;
        }).join('') : `<div class="empty-state">💬<br>Belum ada chat</div>`;
        document.querySelectorAll('.chat-list-item').forEach(el => el.addEventListener('click', ()=> openChat(el.dataset.id)));
      }
      function renderFriendsList() {
        const container = document.getElementById('friends-list-container');
        container.innerHTML = friendsList.length ? friendsList.map(f => {
          const blocked = blockedUsers.some(b=>b.chatId===f.chatId);
          return `<div class="chat-list-item"><div class="avatar">${f.name[0]}</div><div class="chat-info"><strong>${f.name}</strong><br><small>${f.chatId}</small></div>
            <button class="btn btn-sm btn-outline chat-btn" data-id="${f.chatId}">💬</button>
            <button class="btn btn-sm ${blocked?'btn-success':'btn-danger'} block-btn" data-id="${f.chatId}">${blocked?'Buka':'Blokir'}</button>
            <button class="btn btn-sm btn-danger delete-btn" data-id="${f.chatId}">🗑</button></div>`;
        }).join('') : `<div class="empty-state">🤝<br>Belum ada teman</div>`;
        document.querySelectorAll('.chat-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); openChat(b.dataset.id); }));
        document.querySelectorAll('.block-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); toggleBlock(b.dataset.id); }));
        document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); deleteFriend(b.dataset.id); }));
      }
      function renderMessages() {
        const container = document.getElementById('messages-container');
        if (!currentPartnerId || !allChats[currentPartnerId]) return;
        const chat = allChats[currentPartnerId];
        container.innerHTML = chat.messages.map(msg => {
          const isMe = msg.sender === 'me';
          return `<div class="message-bubble ${isMe?'message-sent':'message-received'}">
            ${msg.content}<div style="font-size:10px;opacity:0.7;">${formatTime(msg.timestamp)}</div></div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
      }
      function openChat(partnerId) {
        if (!allChats[partnerId]) {
          const f = friendsList.find(f=>f.chatId===partnerId);
          if (!f) return;
          allChats[partnerId] = { partnerName: f.name, messages:[], pinned:[], online:false };
        }
        currentPartnerId = partnerId;
        document.getElementById('chat-detail-screen').classList.add('active');
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('chat-partner-name').textContent = allChats[partnerId].partnerName;
        const statusEl = document.getElementById('chat-partner-status');
        statusEl.textContent = allChats[partnerId].online ? 'online' : 'offline';
        statusEl.className = 'header-status' + (allChats[partnerId].online ? '' : ' offline');
        renderMessages();
      }
      function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !currentPartnerId) return;
        const payload = { type:'text', content:text, sender: currentUser.chatId, timestamp: new Date().toISOString() };
        // Coba kirim via BLE
        sendViaBluetooth(currentPartnerId, payload).then(success => {
          if (!success) toast('Gagal mengirim via Bluetooth');
        });
        // Simpan lokal
        allChats[currentPartnerId].messages.push({ type:'text', content:text, sender:'me', timestamp: payload.timestamp });
        input.value = '';
        save(); renderMessages(); renderChatList();
      }
      function toggleBlock(chatId) {
        const friend = friendsList.find(f=>f.chatId===chatId);
        if (!friend) return;
        const idx = blockedUsers.findIndex(b=>b.chatId===chatId);
        if (idx >= 0) { blockedUsers.splice(idx,1); toast('Dibuka blokir'); }
        else { blockedUsers.push({ name: friend.name, chatId }); toast('Diblokir'); }
        save(); renderFriendsList();
      }
      function deleteFriend(chatId) {
        if (!confirm('Hapus kontak ini?')) return;
        friendsList = friendsList.filter(f => f.chatId !== chatId);
        if (allChats[chatId]) delete allChats[chatId];
        blockedUsers = blockedUsers.filter(b => b.chatId !== chatId);
        save(); renderFriendsList(); renderChatList(); toast('Kontak dihapus');
      }
      function editProfile() {
        showModal(`<h3>Edit Profil</h3><input type="text" id="edit-username" value="${currentUser.username}" style="width:100%;padding:12px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);"><button class="btn btn-primary" id="save-profile" style="margin-top:12px;">Simpan</button>`);
        document.getElementById('save-profile').addEventListener('click', () => {
          const newName = document.getElementById('edit-username').value.trim();
          if (!newName) return toast('Nama tidak boleh kosong');
          currentUser.username = newName;
          save();
          updateProfileTab();
          hideModal();
          toast('Profil diperbarui');
        });
      }
      function updateProfileTab() {
        if (!currentUser) return;
        document.getElementById('profile-name').textContent = currentUser.username;
        document.getElementById('profile-id').textContent = currentUser.chatId;
        document.getElementById('profile-avatar').textContent = currentUser.username[0];
        // QR code (sederhana)
        const canvas = document.getElementById('profile-qr');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#fff'; ctx.fillRect(0,0,180,180);
          ctx.fillStyle = '#000';
          for (let i=0; i<currentUser.chatId.length*2; i++) {
            ctx.fillRect(Math.random()*180, Math.random()*180, 4, 4);
          }
        }
      }
      function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const tabEl = document.getElementById('tab-'+tab);
        if (tabEl) tabEl.style.display = 'flex';
        const nav = document.querySelector(`.nav-item[data-tab="${tab}"]`);
        if (nav) nav.classList.add('active');
        if (tab === 'chat') renderChatList();
        else if (tab === 'friends') renderFriendsList();
        else if (tab === 'profile') updateProfileTab();
      }
      function switchScreen(screen) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screen+'-screen').classList.add('active');
      }

      // ==================== EVENT LISTENERS ====================
      document.getElementById('btn-login').addEventListener('click', () => {
        const name = document.getElementById('username-input').value.trim();
        if (!name) return toast('Masukkan nama');
        currentUser = { username: name, chatId: genId() };
        save();
        switchScreen('permission');
        updatePermUI();
      });
      function updatePermUI() {
        document.getElementById('dot-bluetooth').className = 'status-dot ' + (permissions.bluetooth ? 'dot-ok' : 'dot-no');
        document.getElementById('status-bluetooth').textContent = permissions.bluetooth ? '✅ Siap' : '❌ Belum';
        document.getElementById('dot-mic').className = 'status-dot ' + (permissions.mic ? 'dot-ok' : 'dot-no');
        document.getElementById('status-mic').textContent = permissions.mic ? '✅ Siap' : '❌ Belum';
        document.getElementById('dot-cam').className = 'status-dot ' + (permissions.camera ? 'dot-ok' : 'dot-no');
        document.getElementById('status-cam').textContent = permissions.camera ? '✅ Siap' : '❌ Belum';
      }
      document.getElementById('btn-check-perms').addEventListener('click', async () => {
        await checkBluetooth();
        // Mikrofon dan kamera bisa dicek nanti sesuai kebutuhan
        navigator.mediaDevices.getUserMedia({ audio: true }).then(() => { permissions.mic = true; }).catch(() => { permissions.mic = false; });
        navigator.mediaDevices.getUserMedia({ video: true }).then(() => { permissions.camera = true; }).catch(() => { permissions.camera = false; });
        updatePermUI();
        updateBluetoothIndicator();
        if (!permissions.bluetooth) toast('Bluetooth harus diaktifkan! Buka pengaturan.');
        else toast('Bluetooth siap!');
        save();
        switchScreen('main');
        switchTab('chat');
      });
      document.getElementById('btn-skip-perms').addEventListener('click', () => {
        switchScreen('main');
        switchTab('chat');
      });
      document.getElementById('btn-back-chat').addEventListener('click', () => {
        currentPartnerId = null;
        document.getElementById('chat-detail-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        switchTab('chat');
      });
      document.getElementById('btn-send').addEventListener('click', sendMessage);
      document.getElementById('message-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
      document.getElementById('btn-voice').addEventListener('pointerdown', e => {
        e.preventDefault();
        if (!currentPartnerId) return;
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          mediaRecorder = new MediaRecorder(stream);
          const chunks = [];
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunks, { type: 'audio/webm' });
            // Kirim voice note via BLE (base64) -- sederhana belum implementasi penuh
            toast('Voice note terkirim (simulasi)');
          };
          mediaRecorder.start();
          recStart = Date.now();
          isRecording = true;
          document.getElementById('btn-voice').classList.add('recording');
        }).catch(() => toast('Izin mikrofon diperlukan'));
      });
      document.getElementById('btn-voice').addEventListener('pointerup', () => {
        if (isRecording && mediaRecorder) { mediaRecorder.stop(); isRecording = false; document.getElementById('btn-voice').classList.remove('recording'); }
      });
      document.getElementById('btn-scan-ble').addEventListener('click', scanForDevices);
      document.getElementById('btn-add-friend').addEventListener('click', () => {
        showModal(`<h3>Tambah Teman</h3><div class="modal-option" id="add-via-id">🆔 Via ID Chat</div><div class="modal-option" id="add-via-qr">📷 Scan QR</div><div class="modal-option" onclick="hideModal()">Batal</div>`);
        document.getElementById('add-via-id').addEventListener('click', () => {
          hideModal();
          const id = prompt('Masukkan ID Chat (23 karakter):');
          if (id && id.length === 23) {
            if (!friendsList.find(f => f.chatId === id) && id !== currentUser.chatId) {
              friendsList.push({ name: 'User-'+id.substring(0,6), chatId: id });
              allChats[id] = { partnerName: 'User-'+id.substring(0,6), messages:[], pinned:[], online: false };
              save(); renderFriendsList(); renderChatList(); toast('Teman ditambahkan');
            } else toast('ID tidak valid atau sudah ada');
          } else toast('ID harus 23 karakter');
        });
        document.getElementById('add-via-qr').addEventListener('click', () => { hideModal(); /* QR scan bisa menggunakan html5-qrcode */ });
      });
      document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
      document.getElementById('search-chat').addEventListener('input', e => renderChatList(e.target.value));
      document.getElementById('btn-edit-profile').addEventListener('click', editProfile);
      document.getElementById('menu-theme').addEventListener('click', () => {
        const themes = ['dark','light','system'];
        const idx = themes.indexOf(settings.theme);
        settings.theme = themes[(idx+1)%3];
        save(); applyTheme();
        toast('Tema: ' + settings.theme);
      });
      document.getElementById('menu-about').addEventListener('click', () => {
        showModal('<h3>Tentang AnonMesh Chat</h3><p>v1.0 Bluetooth Mesh</p><p>Komunikasi via BLE, enkripsi end-to-end.</p><button class="btn btn-outline" onclick="hideModal()">Tutup</button>');
      });
      document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) hideModal(); });

      // ==================== INIT ====================
      async function init() {
        load();
        applyTheme();
        await checkBluetooth();
        updateBluetoothIndicator();
        document.getElementById('splash-screen').classList.remove('hidden');
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
          if (currentUser) {
            switchScreen('main');
            switchTab('chat');
            renderChatList();
            renderFriendsList();
            updateProfileTab();
          } else {
            switchScreen('login');
          }
        }, 1500);
        window.addEventListener('popstate', (e) => {
          if (document.getElementById('chat-detail-screen').classList.contains('active')) {
            document.getElementById('btn-back-chat').click();
            e.preventDefault();
          }
        });
      }
      init();
    })();
  </script>
</body>
</html>
